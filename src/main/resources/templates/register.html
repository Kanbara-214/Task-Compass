<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 | Task Compass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/task-compass.css}">
</head>

<body class="auth-body">
    <main class="auth-shell compact">
        <section class="auth-panel wide">
            <div class="panel-card">
                <p class="panel-label">Create Account</p>
                <h1>新規登録</h1>
                <p class="section-copy">自分専用のタスク優先度ダッシュボードを作成します。</p>

                <form method="post" th:action="@{/register}" th:object="${registrationForm}" class="stack-form">
                    <div class="flash error" th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}"
                        th:text="${error}"></div>

                    <label class="field">
                        <span>表示名</span>
                        <input type="text" th:field="*{displayName}" placeholder="山田 太郎">
                        <small class="error-text" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></small>
                    </label>

                    <label class="field">
                        <span>メールアドレス</span>
                        <input type="email" th:field="*{email}" placeholder="you@example.com">
                        <small class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                    </label>

                    <label class="field">
                        <span>パスワード</span>
                        <input type="password" th:field="*{password}" placeholder="8文字以上">
                        <small class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
                    </label>

                    <label class="field">
                        <span>確認用パスワード</span>
                        <input type="password" th:field="*{confirmPassword}" placeholder="もう一度入力">
                        <small class="error-text" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
                    </label>

                    <button type="submit" class="primary-button full">アカウントを作成する</button>
                </form>

                <p class="auth-link">
                    すでにアカウントがある場合は
                    <a th:href="@{/login}">ログイン</a>
                </p>
            </div>
        </section>
    </main>
</body>

</html>
