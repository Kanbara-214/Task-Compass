spring.application.name=TaskCompass
spring.thymeleaf.cache=false
spring.config.import=optional:file:./config/application.properties

# デフォルトではインメモリ H2 を使い、
# ローカル DB の準備なしで起動できるようにしています。
spring.datasource.url=${TASK_COMPASS_DB_URL:jdbc:h2:mem:task-compass;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${TASK_COMPASS_DB_USERNAME:sa}
spring.datasource.password=${TASK_COMPASS_DB_PASSWORD:}

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

mybatis.type-aliases-package=com.kanbara.taskcompass.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler
